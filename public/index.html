<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPLYT — Split Water Experiences</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: linear-gradient(180deg, #0A1628 0%, #0F1923 50%, #0A1628 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
    .tagline { color: #4FC3F7; font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    p { color: #8899AA; font-size: 16px; line-height: 1.5; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #2196F3;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      padding: 16px 48px;
      border-radius: 14px;
      transition: opacity 0.2s;
      width: 100%;
    }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⛵</div>
    <h1>SPLYT</h1>
    <p class="tagline">Split the waves, share the cost</p>
    <p>Yacht charters, boat rentals, and water experiences — split with friends so everyone rides for less.</p>
    <a class="btn" href="https://apps.apple.com/app/splyt/id6740092740">Download on the App Store</a>
  </div>
</body>
</html>
